<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>International Student Support</title>

<style>
body{

  margin:0;
  background:#f4f7fb;

header{

  color:white;
  padding:20px;
  font-size:24px;
}

}

}

}

  width:100%;

  border-radius:16px;
  box-shadow:0 3px 10px rgba(0,0,0,0.12);

  color:#222;
  text-align:left;
}

.card:hover{
  transform:translateY(-3px);
}

.icon{
  font-size:34px;
  margin-bottom:8px;
}

.title{
  font-size:18px;
  font-weight:bold;
}

.desc{
  margin-top:6px;
  font-size:14px;
  color:#666;
  line-height:1.5;
}

footer{
  margin-top:32px;
  padding:16px;
  font-size:11px;
  color:#999;

<body>

<header>
International Student Life Support
<div class="subtitle">Check all essential procedures in one place</div>
</header>

<div class="container">

<div class="card">
<div class="icon">🚗</div>

<div class="desc">
License conversion, tests, required documents
</div>
</div>
</a>

<div class="icon">🏠</div>

<div class="desc">
Room search, contracts, initial costs
</div>
</div>
</a>

<!-- Administrative Procedures -->

<div class="card">
<div class="icon">📄</div>
<div class="title">Administrative Procedures</div>

</div>
</div>
</a>

</div>

<footer>
© Student Support Platform
